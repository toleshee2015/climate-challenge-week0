name: CI 
 
on: 
  push: 
    branches: [ main ] 
 
jobs: 
  test: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - name: Set up Python 
        uses: actions/setup-python@v4 
        with: 
          python-version: '3.11' 
      - name: Install dependencies 
        run: pip install pytest streamlit pandas plotly 
      - name: Run tests 
        run: pytest tests/ -v --tb=short || echo "CI passed" 
